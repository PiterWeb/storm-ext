name: Build

# https://docs.github.com/en/actions/learn-github-actions/workflow-syntax-for-github-actions#concurrency
concurrency: 
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      # choose your default branch
      - master
      - main
    paths-ignore:
      - '*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master
        with:
          path: "src"
          fetch-depth: 2
      
      # - name: Detect changed plugins
      #   id: changes
      #   run: |
      #     cd $GITHUB_WORKSPACE/src
      #     CHANGED=$(git diff --name-only HEAD^ HEAD)
      #     echo "Changed files name only: $CHANGED"
      #     PLUGINS=$(echo "$CHANGED" \
      #     | grep '/' \
      #     | cut -d'/' -f1 \
      #     | sort -u \
      #     | grep -vE '^(\.github|gradle)$' \
      #     | tr '\n' ' ')
      #     echo "Changed plugins: $PLUGINS"
      #     echo "plugins=$PLUGINS" >> $GITHUB_OUTPUT

      - name: Checkout builds
        uses: actions/checkout@master
        with:
          ref: "builds"
          path: "builds"
      
      - name: Clean old builds
        run: rm $GITHUB_WORKSPACE/builds/*.cs3 || true

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make makePluginsJson
          cp **/build/*.cs3 $GITHUB_WORKSPACE/builds
          cp build/plugins.json $GITHUB_WORKSPACE/builds

      # - name: Build changed plugins
      #   if: steps.changes.outputs.plugins != ''
      #   run: |
      #     cd $GITHUB_WORKSPACE/src
      #     chmod +x gradlew
      #     for plugin in ${{ steps.changes.outputs.plugins }}; do
      #       echo "Building plugin: $plugin"
      #       ./gradlew :$plugin:make
      #       cp $plugin/build/*.cs3 $GITHUB_WORKSPACE/builds || true
      #     done
      #     ./gradlew makePluginsJson --exclude-task make
      #     cp build/plugins.json $GITHUB_WORKSPACE/builds

      - name: Push builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit --amend -m "Build $GITHUB_SHA" || exit 0   # do not error if nothing to commit
          git push --force
